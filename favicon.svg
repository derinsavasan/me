<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="8-ball">
  <!-- the ball, filling the frame so no space is wasted -->
  <circle cx="16" cy="16" r="15.5" fill="#000000"/>
  <!-- shine, upper-left -->
  <ellipse cx="11" cy="10.5" rx="3.6" ry="1.5" transform="rotate(-45 11 10.5)" fill="#7d7d7d"/>
  <!-- white disc -->
  <circle cx="19" cy="19" r="7.5" fill="#ffffff"/>
  <!-- the "8" (two stacked rings) -->
  <g fill="none" stroke="#000000" stroke-width="1.7">
    <circle cx="19" cy="16.9" r="2"/>
    <circle cx="19" cy="20.7" r="2.6"/>
  </g>
</svg>
